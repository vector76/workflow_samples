name: (no-bm 3) Bead Implementer
description: >-
  Mechanically identical to the work workflow, but every bm command is
  swapped for bs. Use this when the queue is a bare beads server with no
  feature layer in front of it.
input:
  mode: none

states:
  START:
    timeout: 4000
    sh: |
      #!/bin/bash

      # When ONCE returns, RAYMOND_INPUT carries its result. Propagate the
      # terminal "all beads are done" signal up to terminate the workflow
      # instead of re-entering the wait-ready/claim loop.
      if [ "$RAYMOND_INPUT" = "ALL_DONE" ]; then
          echo "<result>ALL_DONE</result>"
          exit 0
      fi

      # Poll wait-ready in 300s chunks (12 × 300 = 3600s total) so that a
      # depleted backlog can terminate quickly instead of hanging on a single
      # long wait. Between chunks, check whether any non-terminal beads remain;
      # if not, propagate ALL_DONE.
      attempts=100
      while [ "$attempts" -gt 0 ]; do
          if bs wait-ready --timeout 30 >/dev/null 2>&1; then
              break
          fi
          # Only terminate on a confirmed-empty list. A transient bs failure
          # would also produce an empty `remaining`, and we'd rather loop than
          # falsely kill the worker.
          remaining_json=$(bs list --status open,not_ready,in_progress 2>/dev/null)
          if [ $? -eq 0 ]; then
              remaining=$(printf '%s' "$remaining_json" | jq -r '.beads | length' 2>/dev/null)
              if [ "$remaining" = "0" ]; then
                  echo "<result>ALL_DONE</result>"
                  exit 0
              fi
          fi
          attempts=$((attempts - 1))
      done

      echo "<function return=\"START\">ONCE</function>"
  ONCE:
    sh: |
      #!/bin/bash

      if bs list >/dev/null 2>&1; then
          echo "<goto>CLAIM</goto>"
      else
          sleep 10
          echo "<result>NOT CONFIGURED</result>"
      fi
  CLAIM:
    sh: |
      #!/bin/bash

      # Check for an existing in-progress task from a previous run
      task_id=$(bs mine 2>/dev/null | jq -r '.beads[0].id // empty' 2>/dev/null)

      if [ -n "$task_id" ]; then
          echo "<function return=\"DONE\" input=\"$task_id\">WORK</function>"
          exit 0
      fi

      # No in-progress task — try to claim one
      task_id=$(bs list --ready 2>/dev/null | jq -r '.beads[0].id // empty' 2>/dev/null)

      if [ -z "$task_id" ]; then
          # Nothing ready right now. Terminate only if there is no remaining
          # non-terminal work anywhere — otherwise another worker's in-progress
          # bead (or a bead still being created) may unblock things, so wait.
          # A transient bs failure must not be treated as "empty" — loop instead.
          remaining_json=$(bs list --status open,not_ready,in_progress 2>/dev/null)
          if [ $? -eq 0 ]; then
              remaining=$(printf '%s' "$remaining_json" | jq -r '.beads | length' 2>/dev/null)
              if [ "$remaining" = "0" ]; then
                  echo "<result>ALL_DONE</result>"
                  exit 0
              fi
          fi
          sleep 30
          echo "<goto>CLAIM</goto>"
          exit 0
      fi

      if bs claim "$task_id" >/dev/null 2>&1; then
          git pull
          echo "<function return=\"DONE\" input=\"$task_id\">WORK</function>"
          exit 0
      fi

      echo "<result>CLAIM FAILED</result>"
  WORK:
    prompt: |-
      Your task ID is `{{input}}`. Start by getting the full task description:

          bs show {{input}}

      Then implement the task. Do not stage, commit, or review the code yet — those
      happen in later steps.
    force_implicit: true
    allowed_transitions:
      - tag: goto
        target: REVIEW
  REVIEW:
    prompt: |-
      Review the implementation with fresh eyes. Look carefully for mistakes, bugs,
      unhandled edge cases, or places where there is a clearly better approach. Run
      any relevant tests. Fix anything you find. There may be nothing wrong — the
      point is to check.

      Do not stage or commit yet — that happens in a later step.
    force_implicit: true
    allowed_transitions:
      - tag: call
        target: DID_FIX
        return: AGAIN_CHOICE
  DID_FIX:
    prompt: |
      Look at the review that just completed. Did it result in any actual code changes
      or fixes?

      - If anything was changed or fixed (even something minor) respond with `<result>YES</result>`
      - If nothing was changed (the review found nothing worth fixing, or only made
        observations without modifying anything) respond with  `<result>NO</result>`
    allowed_transitions:
      - tag: result
        payload: YES
      - tag: result
        payload: NO
  AGAIN_CHOICE:
    sh: |
      #!/bin/bash

      if [ "$RAYMOND_INPUT" = "YES" ]; then
          echo "<goto>REVIEW</goto>"
      else
          echo "<goto>COMMIT</goto>"
      fi
  COMMIT:
    prompt: |
      Evaluate the full implementation history and determine whether the task was
      completed successfully.

      If there is an unresolved problem (missing features, failing tests, or other
      blocking issues):
      - Do NOT stage or commit anything
      - Do NOT close the bs item
      - Leave all files dirty
      - Respond with `<goto>BAIL_OUT</goto>`

      If the implementation is complete and successful:
      1. Stage the relevant files with `git add`
      2. Commit with a descriptive message:
         - Do not mention Claude as a coauthor or contributor
      3. Do NOT push — that is handled by PUSH_ATTEMPT
      4. Do NOT close the bs item yet
      5. Respond with `<goto>PUSH_ATTEMPT</goto>`
    allowed_transitions:
      - tag: goto
        target: PUSH_ATTEMPT
      - tag: goto
        target: BAIL_OUT
  BAIL_OUT:
    sh: |
      #!/bin/bash
      # BAIL_OUT.sh — abandon current work and release the task for another agent
      #
      # The task ID is expected in RAYMOND_INPUT (set when the CLAIM function was entered).

      TASK_ID="$RAYMOND_INPUT"

      # Abort any in-progress rebase (safe even if none is in progress)
      git rebase --abort 2>/dev/null || true

      # Reset local branch to match the current branch's remote head
      branch=$(git rev-parse --abbrev-ref HEAD)
      git reset --hard "origin/$branch"

      # Clean untracked files
      git clean -fd

      # Delete push attempt counter if it exists
      rm -f .raymond/.push_attempts

      # Release the task: clear assignee first (prevents race with another agent),
      # then set status to open
      bs edit "$TASK_ID" --assignee ""
      bs edit "$TASK_ID" --status open

      echo '<result>BAIL_OUT</result>'
  PUSH_ATTEMPT:
    sh: |
      #!/bin/bash
      # PUSH_ATTEMPT.sh — attempt git push with retry counter
      #
      # Increments a counter each attempt. If over the cap, goto BAIL_OUT.
      # On successful push, goto CLOSE_TASK.
      # On rejection (non-fast-forward), goto REBASE.

      COUNTER_FILE=".raymond/.push_attempts"
      MAX_ATTEMPTS=5

      mkdir -p .raymond

      if [ -f "$COUNTER_FILE" ]; then
          count=$(cat "$COUNTER_FILE")
      else
          count=0
      fi

      count=$((count + 1))

      if [ "$count" -gt "$MAX_ATTEMPTS" ]; then
          rm -f "$COUNTER_FILE"
          echo '<goto>BAIL_OUT</goto>'
          exit 0
      fi

      echo "$count" > "$COUNTER_FILE"

      if git push origin HEAD >/dev/null 2>&1; then
          rm -f "$COUNTER_FILE"
          echo '<goto>CLOSE_TASK</goto>'
      else
          echo '<goto>REBASE</goto>'
      fi
  CLOSE_TASK:
    prompt: |
      The work has been pushed successfully.  Close the task on the beads server.

      Run `bs close <id>` using the task ID from earlier in the conversation.
    force_implicit: true
    allowed_transitions:
      - tag: result
        payload: GOOD
  REBASE:
    sh: |
      #!/bin/bash
      # REBASE.sh — fetch and rebase onto the current branch's remote head
      #
      # Outcomes:
      #   fetch fail  → <goto>BAIL_OUT</goto>   (network/auth failure)
      #   clean       → <goto>RETEST</goto>     (rebased cleanly, verify code)
      #   conflicts   → <goto>RESOLVE</goto>    (needs conflict resolution)

      branch=$(git rev-parse --abbrev-ref HEAD)

      if ! git fetch origin >/dev/null 2>&1; then
          echo '<goto>BAIL_OUT</goto>'
          exit 0
      fi

      git rebase "origin/$branch" >/dev/null 2>&1
      exit_code=$?

      if [ $exit_code -ne 0 ]; then
          echo '<goto>RESOLVE</goto>'
      else
          echo '<goto>RETEST</goto>'
      fi
  RESOLVE:
    prompt: |
      A `git rebase` has encountered merge conflicts.  Your job is to resolve them.

      Examine the conflicted files using `git status` and `git diff`.  For each
      conflict, understand what both sides intended and resolve meaningfully — do
      not just pick one side blindly.

      After resolving all conflicts in a file, stage it with `git add <file>`.

      Once all conflicts are resolved, run `git rebase --continue`.  If the
      rebase has multiple commits to replay, `--continue` may stop again with
      new conflicts on a subsequent commit.  Repeat the resolve/add/continue
      cycle until the rebase finishes completely.

      If the rebase completes successfully, respond with `<goto>RETEST</goto>`
      so the code can be verified.

      If the conflicts are too complex or contradictory to resolve, abort the
      rebase with `git rebase --abort` and respond with `<goto>BAIL_OUT</goto>`
      to abandon this task and release it for another agent.
    allowed_transitions:
      - tag: goto
        target: RETEST
      - tag: goto
        target: BAIL_OUT
  RETEST:
    prompt: |
      A rebase has just completed, incorporating upstream changes into our work.
      The rebase may have introduced subtle incompatibilities even if there were
      no textual conflicts.

      Run the project's test suite to verify that everything still works correctly.

      If all tests pass, respond with `<goto>PUSH_ATTEMPT</goto>`.

      If tests fail, respond with `<goto>REWORK</goto>`.
    allowed_transitions:
      - tag: goto
        target: PUSH_ATTEMPT
      - tag: goto
        target: REWORK
  REWORK:
    prompt: |
      Tests are failing after a rebase.  Diagnose and fix the failures.  The
      problem may be an incompatibility between the upstream changes and our
      implementation.

      Do not stage or commit — that is handled by COMMIT.

      If you are able to fix the failures, respond with `<goto>COMMIT</goto>`.

      If the failures cannot be resolved (too complex, contradictory requirements,
      or repeated unsuccessful attempts), respond with `<goto>BAIL_OUT</goto>`
      to abandon this task and release it for another agent.
    allowed_transitions:
      - tag: goto
        target: COMMIT
      - tag: goto
        target: BAIL_OUT
  DONE:
    sh: |
      #!/bin/bash

      if [ "$RAYMOND_INPUT" = "GOOD" ] || [ "$RAYMOND_INPUT" = "BAIL_OUT" ]; then
          echo "<reset>CLAIM</reset>"
      else
          echo "<result>$RAYMOND_INPUT</result>"
      fi
