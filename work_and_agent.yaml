states:
  START:
    sh: |
      #!/bin/bash
      echo "<fork-workflow next=\"START_WORK\">../agent.yaml</fork-workflow>"
  START_WORK:
    sh: |
      #!/bin/bash
      echo "<fork-workflow next=\"DONE\">../work.yaml</fork-workflow>"
  DONE:
    sh: |
      #!/bin/bash
      echo "<result>LAUNCHED</result>"
