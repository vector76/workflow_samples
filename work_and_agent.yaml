name: (bm) Planner + Implementer
description: >-
  Launcher that forks the agent and work workflows as concurrent child
  workflows, so one Raymond instance acts as both feature planner and bead
  implementer against the bm backlog.
input:
  mode: none

states:
  START:
    sh: |
      #!/bin/bash
      echo "<fork-workflow next=\"START_WORK\">../agent.yaml</fork-workflow>"
  START_WORK:
    sh: |
      #!/bin/bash
      echo "<fork-workflow next=\"DONE\">../work.yaml</fork-workflow>"
  DONE:
    sh: |
      #!/bin/bash
      echo "<result>LAUNCHED</result>"
